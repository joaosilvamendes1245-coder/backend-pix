<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elite Mundi Store</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="container">
    <header class="hero">
      <h1>Elite Mundi Store</h1>
      <p>Escolha o serviço, selecione o plano e gere seu pagamento.</p>
    </header>

    <section class="card">
      <h2>1. Escolha o serviço</h2>
      <div id="servicosGrid" class="grid-cards"></div>
    </section>

    <section class="card">
      <h2>2. Escolha o plano</h2>
      <div id="planosGrid" class="grid-cards"></div>
    </section>

    <section class="card">
      <h2>3. Escolha a quantidade</h2>
      <div id="quantidadesGrid" class="grid-cards qtd-grid"></div>

      <div class="outros-box">
        <button id="btnOutros" class="secondary-btn" type="button">Outros</button>
        <input type="number" id="quantidadeOutra" class="hidden" placeholder="Digite outra quantidade" min="1" />
      </div>
    </section>

    <section class="card">
      <h2>4. Informe seus dados</h2>

      <label>Telefone para contato</label>
      <input type="text" id="telefone" placeholder="55DDDNUMERO" />

      <label>Email</label>
      <input type="email" id="email" placeholder="Seu email" />

      <label id="linkLabel">Link</label>
      <input type="text" id="link_alvo" placeholder="Cole o link aqui" />

      <label>Nome</label>
      <input type="text" id="nome" placeholder="Seu nome" />

      <div class="resumo">
        <p><strong>Serviço:</strong> <span id="resumoServico">-</span></p>
        <p><strong>Plano:</strong> <span id="resumoPlano">-</span></p>
        <p><strong>Quantidade:</strong> <span id="resumoQuantidade">-</span></p>
        <p><strong>Valor:</strong> R$ <span id="resumoValor">0,00</span></p>
      </div>

      <button id="btnGerar">Gerar pagamento</button>
      <div id="status" class="status"></div>
    </section>

    <section id="resultado" class="card hidden">
      <h2>Pagamento gerado</h2>
      <p><strong>Pedido:</strong> <span id="pedidoNumero"></span></p>
      <p><strong>Status:</strong> <span id="pedidoStatus"></span></p>
      <p><strong>Valor:</strong> R$ <span id="pedidoValor"></span></p>

      <label>Pix copia e cola</label>
      <textarea id="qrCode" rows="6" readonly></textarea>

      <a id="btnPagar" class="primary-link" target="_blank">Abrir link de pagamento</a>
      <button id="btnCopiarPix">Copiar Pix</button>
    </section>
  </div>

  <script src="/app.js"></script>
</body>
</html>
